<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ListUA — Дошка оголошень України</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 0;
    }

    header {
        background: #0057FF;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 28px;
        font-weight: bold;
    }

    main {
        max-width: 800px;
        margin: 20px auto;
        background: white;
        padding: 20px;
        border-radius: 8px;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 6px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px 16px;
        background: #0057FF;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 10px;
    }

    button:hover {
        background: #003fcc;
    }

    .post {
        background: #fafafa;
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 15px;
        border: 1px solid #ddd;
    }

    .top-badge {
        background: #FFD700;
        color: #000;
        padding: 4px 8px;
        display: inline-block;
        font-weight: bold;
        margin-bottom: 6px;
        border-radius: 4px;
    }

    footer {
        text-align: center;
        padding: 20px;
        color: #777;
    }
</style>
</head>

<body>

<header>ListUA</header>

<main>
    <h2>Створити оголошення</h2>

    <input id="title" placeholder="Заголовок">
    <textarea id="description" placeholder="Опис"></textarea>
    <input id="price" placeholder="Ціна (грн)" type="number">

    <button onclick="createPost()">Опублікувати</button>

    <hr>

    <h2>Оголошення</h2>
    <div id="posts"></div>
</main>

<footer>ListUA — сучасна українська дошка оголошень</footer>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = supabase.createClient(
    "https://lcbdxnbeoresboukklva.supabase.co",
    "sb_publishable_gYFaHN7htBJ2MJS2ZvEI2g_XsbC3d9m"
);

async function createPost() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("description").value;
    const price = document.getElementById("price").value;

    if (!title || !description || !price) {
        alert("Заповніть всі поля!");
        return;
    }

    await supabase.from("posts").insert({
        title,
        description,
        price,
        is_top: false
    });

    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
    document.getElementById("price").value = "";

    loadPosts();
}

async function loadPosts() {
    const { data } = await supabase
        .from("posts")
        .select("*")
        .order("is_top", { ascending: false })
        .order("created_at", { ascending: false });

    const list = document.getElementById("posts");
    list.innerHTML = "";

    data.forEach(post => {
        const item = document.createElement("div");
        item.className = "post";

        const topBadge = post.is_top ? "<div class='top-badge'>TOP</div>" : "";

        item.innerHTML = `
            ${topBadge}
            <h3>${post.title}</h3>
            <p>${post.description}</p>
            <strong>${post.price} грн</strong><br><br>
            <button onclick="makeTop('${post.id}')">Підняти в TOP</button>
        `;

        list.appendChild(item);
    });
}

async function makeTop(id) {
    await supabase.from("posts").update({ is_top: true }).eq("id", id);
    loadPosts();
}

document.addEventListener("DOMContentLoaded", loadPosts);
</script>

</body>
</html>
