<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>ListUA — Оголошення України</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 20px auto;
            padding: 10px;
        }

        .post {
            border: 1px solid #ccc;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 6px;
            background: #fafafa;
        }

        .meta {
            color: #555;
            font-size: 14px;
            margin-top: 4px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
        }

        button {
            padding: 8px 14px;
            cursor: pointer;
        }

        /* КНОПКА ВИДАЛИТИ */
        .delete-btn {
            background: #ff3b3b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            display: inline-block;
        }

        .delete-btn:hover {
            background: #d62828;
        }
    </style>
</head>

<body>

<h2>Додати оголошення</h2>

<input id="title" placeholder="Заголовок">
<input id="description" placeholder="Опис">
<input id="price" placeholder="Ціна">
<input id="contact" placeholder="Контакт">
<input id="region" placeholder="Регіон">
<input id="category" placeholder="Категорія">

<button onclick="addPost()">Додати</button>

<hr>

<h2>Оголошення</h2>
<div id="posts"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
    const supabaseUrl = "https://lcbdxnbeoresboukklva.supabase.co";
    const supabaseKey = "YOUR_PUBLIC_ANON_KEY";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    function escapeHtml(text) {
        return text.replace(/[&<>"']/g, function (m) {
            return ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            })[m];
        });
    }

    async function addPost() {
        await supabaseClient
            .from("posts")
            .insert([{
                title: title.value,
                description: description.value,
                price: price.value,
                contact: contact.value,
                region: region.value,
                category: category.value
            }]);

        loadPosts();
    }

    async function deletePost(id) {
        await supabaseClient.from("posts").delete().eq("id", id);
        loadPosts();
    }

    function renderPost(post) {
        const priceText = post.price ? `${post.price} грн` : "ціна не вказана";

        return `
            <div class="post">
                <h3>${escapeHtml(post.title)}</h3>
                <p>${escapeHtml(post.description)}</p>

                <div class="meta">
                    ${escapeHtml(post.region || "")} · ${escapeHtml(post.category || "")}
                </div>

                <div class="meta">
                    ${priceText} · контакт: ${escapeHtml(post.contact || "")}
                </div>

                <button class="delete-btn" onclick="deletePost(${post.id})">
                    Видалити
                </button>
            </div>
        `;
    }

    async function loadPosts() {
        const { data } = await supabaseClient
            .from("posts")
            .select("*")
            .order("id", { ascending: false });

        posts.innerHTML = data.map(renderPost).join("");
    }

    loadPosts();
</script>

</body>
</html>
